version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  # Bold 勤怠・Playwright（GitHub Actions の npm ci 対象）
  - package-ecosystem: npm
    directory: /playwright
    schedule:
      interval: weekly

  # playwright-test サブプロジェクト（別 lockfile）
  - package-ecosystem: npm
    directory: /playwright/playwright-test
    schedule:
      interval: weekly
