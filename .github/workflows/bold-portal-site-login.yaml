# Bold ポータル勤怠: playwright/playwright-test/site-login.js
# 必要な Secrets（Repository secrets）:
#   BOLD_LOGIN_URL       ログインページの URL
#   BOLD_LOGIN_EMAIL     ログインメール
#   BOLD_LOGIN_PASSWORD  ログインパスワード
#
# 手動実行: Actions タブ → 「Bold portal site-login」→ Run workflow

name: Bold portal site-login

on:
  workflow_dispatch:
  schedule:
    - cron: '30 14 * * 5'  # 毎週金曜 23:30 JST (UTC+9)

concurrency:
  group: bold-portal-site-login
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  site-login:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      TZ: Asia/Tokyo

    defaults:
      run:
        working-directory: playwright

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: playwright/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run site-login.js
        env:
          LOGIN_URL: ${{ secrets.BOLD_LOGIN_URL }}
          LOGIN_EMAIL: ${{ secrets.BOLD_LOGIN_EMAIL }}
          LOGIN_PASSWORD: ${{ secrets.BOLD_LOGIN_PASSWORD }}
        run: node playwright-test/site-login.js
